<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Town Adventure: Comparative Game</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --bg: #f0f9ff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { color: var(--secondary); font-size: 2.5rem; }
        
        #question {
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: bold;
            color: #d84315;
        }

        .game-area {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 30px;
        }

        .place-card {
            border: 4px solid #eee;
            border-radius: 15px;
            padding: 15px;
            flex: 1;
            transition: transform 0.2s;
        }

        .place-card img {
            width: 100%;
            max-width: 150px;
            height: auto;
        }

        .place-name {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        #mic-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            transition: all 0.3s;
        }

        #mic-btn:active { transform: scale(0.95); }
        #mic-btn.listening { background-color: #f44336; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(244, 67, 54, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
        }

        #feedback {
            margin-top: 25px;
            min-height: 80px;
            font-size: 1.3rem;
        }

        .success { color: #2e7d32; font-weight: bold; }
        .error { color: #c62828; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏙️ Town Talk!</h1>
        <div id="question">Loading...</div>

        <div class="game-area">
            <div class="place-card" id="card1">
                <span style="font-size: 80px;">🏛️</span>
                <span class="place-name" id="name1">Place 1</span>
            </div>
            <div class="place-card" id="card2">
                <span style="font-size: 80px;">🍔</span>
                <span class="place-name" id="name2">Place 2</span>
            </div>
        </div>

        <button id="mic-btn">🎤 Tap to Speak</button>
        <div id="feedback">Press the button and tell me the answer!</div>
    </div>

    <script>
        // Game Content
        const challenges = [
            { q: "Which place is quieter?", p1: "Library", p1Icon: "🏛️", p2: "Restaurant", p2Icon: "🍔", answer: "quieter", correctPlace: "library" },
            { q: "Which place is friendlier?", p1: "School", p1Icon: "🏫", p2: "Hospital", p2Icon: "🏥", answer: "friendlier", correctPlace: "school" },
            { q: "Which place is more expensive?", p1: "Park", p1Icon: "🌳", p2: "Zoo", p2Icon: "🦁", answer: "expensive", correctPlace: "zoo" },
            { q: "Which place is better for playing?", p1: "Playground", p1Icon: "🛝", p2: "Museum", p2Icon: "🖼️", answer: "better", correctPlace: "playground" },
            { q: "Is the traffic worse at the school or the museum?", p1: "School", p1Icon: "🏫", p2: "Museum", p2Icon: "🖼️", answer: "worse", correctPlace: "school" }
        ];

        let currentId = 0;
        const micBtn = document.getElementById('mic-btn');
        const feedback = document.getElementById('feedback');

        // Check for browser support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            feedback.innerHTML = "❌ Your browser does not support Speech Recognition. Please use Chrome.";
            micBtn.style.display = "none";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;

            // Load Question
            function loadLevel() {
                const data = challenges[currentId];
                document.getElementById('question').innerText = data.q;
                document.getElementById('name1').innerText = data.p1;
                document.getElementById('name2').innerText = data.p2;
                document.querySelector('#card1 span:first-child').innerText = data.p1Icon;
                document.querySelector('#card2 span:first-child').innerText = data.p2Icon;
                feedback.innerHTML = "Listen and speak!";
            }

            micBtn.onclick = () => {
                recognition.start();
                micBtn.classList.add('listening');
                micBtn.innerText = "Listening...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                const data = challenges[currentId];
                
                micBtn.classList.remove('listening');
                micBtn.innerText = "🎤 Tap to Speak";

                // Validation logic: checks if they said the place or the adjective
                if (transcript.includes(data.answer) || transcript.includes(data.correctPlace)) {
                    feedback.innerHTML = `<div class="success">⭐ Great job!<br>"The ${data.correctPlace} is ${data.answer}."</div>`;
                    
                    // Move to next question after 3 seconds
                    setTimeout(() => {
                        currentId = (currentId + 1) % challenges.length;
                        loadLevel();
                    }, 3000);
                } else {
                    feedback.innerHTML = `<div class="error">🤔 Try again!<br>You said: "${transcript}"</div>`;
                }
            };

            recognition.onerror = () => {
                micBtn.classList.remove('listening');
                micBtn.innerText = "🎤 Tap to Speak";
                feedback.innerText = "Try clicking the button again!";
            };

            loadLevel();
        }
    </script>
</body>
</html>
